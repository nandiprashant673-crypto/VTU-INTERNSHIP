<!DOCTYPE html>
<html>
<head>
    <title>CRUD Module</title>
</head>
<body>

<h2>Add Student</h2>

<form method="POST" action="/add">
    Name: <input type="text" name="name" required>
    Course: <input type="text" name="course" required>
    <button type="submit">Add</button>
</form>

<hr>

<h2>Student Records</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Course</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>
            <a href="/edit/{{ student[0] }}">Edit</a>
            <a href="/delete/{{ student[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
