<!DOCTYPE html>
<html>
<head>
    <title>Layout Design</title>
    <style>
        /* Apply general styling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header */
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            background-color: #333;
            padding: 10px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        /* Content */
        .content {
            padding: 20px;
            margin: 20px;
            border: 2px solid #ddd;
            background-color: #f4f4f4;
        }

        /* Footer */
        .footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>My Website</h1>
    </div>

    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

    <div class="content">
        <h2>Welcome!</h2>
        <p>This is the content section of the webpage.</p>
        <p>Here we applied box model concepts like margin, padding, and border.</p>
    </div>

    <div class="footer">
        <p>© 2026 My Website. All Rights Reserved.</p>
    </div>

</body>
</html>
